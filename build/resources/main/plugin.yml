name: pishangextensions
version: '1.3'
main: com.mirai.pishangextensions.Main
api-version: '1.21'
depend:
  - Vault
  - LuckPerms

commands:
  pishangextension:
    description: Main command for Pishang Extension plugin
    usage: /pishangextension <info|reload>
  tpa:
    description: Request to teleport to a player
    usage: /tpa <player>
  tpaccept:
    description: Accept a teleport request
    usage: /tpaccept <player>
  tpacceptall:
    description: Accept all current teleportation request.
    usage: /tpacceptall
  tpahere:
    description: Request player to teleport to you.
    usage: /tpahere <player>
  recording:
    description: Notify other player that the current execute player is recording.
  streaming:
    description: Notify other player that the current execute player is streaming.
